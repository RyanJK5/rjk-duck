name: Build & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 6 * * *'

jobs:
  gcc-trunk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve today's snapshot
        id: meta
        run: |
          real_url=$(curl -sIL -o /dev/null -w '%{url_effective}' https://kayari.org/gcc-latest/gcc-latest.deb)
          echo "url=${real_url}" >> "$GITHUB_OUTPUT"
          echo "filename=$(basename "${real_url}")" >> "$GITHUB_OUTPUT"

      - name: Cache .deb
        id: cache-deb
        uses: actions/cache@v4
        with:
          path: gcc-latest.deb
          key: gcc-latest-${{ steps.meta.outputs.filename }}

      - name: Download .deb
        if: steps.cache-deb.outputs.cache-hit != 'true'
        run: curl -sSL --fail -o gcc-latest.deb "${{ steps.meta.outputs.url }}"

      - name: Install gcc-latest + ninja
        run: |
          sudo dpkg -i gcc-latest.deb || true
          sudo apt-get update -y
          sudo apt-get install -y -f ninja-build
          echo "/opt/gcc-latest/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=/opt/gcc-latest/lib64" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -G Ninja -B build \
            -DRJK_DUCK_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=/opt/gcc-latest/bin/g++

      - name: Build
        run: cmake --build build --target rjk_duck_tests

      - name: Test
        run: ctest --test-dir build --output-on-failure
